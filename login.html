<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Career Developer</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-auth auth-background">
    <header class="site-header page-header utility-header">
        <a class="brand" href="index.html">Career Developer</a>
        <nav class="site-nav" aria-label="Main navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="job.html">Jobs</a>
            <a href="contact.html">Contact</a>
            <a class="nav-button is-active" href="login.html">Login</a>
        </nav>
    </header>
    <main class="auth-shell">
        <section class="auth-card">
            <p class="eyebrow">Welcome back</p>
            <h1>Login to continue exploring job opportunities.</h1>
            <form class="auth-form" action="index.html">
                <label class="auth-field">
                    <span>Username</span>
                    <input type="text" name="username" placeholder="Enter your username" required>
                </label>
                <label class="auth-field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </label>
                <div class="auth-row">
                    <label class="checkbox-row"><input type="checkbox" name="remember"> <span>Remember me</span></label>
                    <a href="form.html">Need an account?</a>
                </div>
                <button class="button button-primary auth-submit" type="submit">Login</button>
            </form>
        </section>
    </main>
</body>
</html>
