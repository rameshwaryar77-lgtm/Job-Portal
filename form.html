<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Career Developer</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-form form-background">
    <main class="form-shell">
        <section class="form-card">
            <p class="eyebrow">Job application</p>
            <h1>Submit your details and we will guide your application forward.</h1>
            <form class="application-form" action="cong.html">
                <label class="form-field">
                    <span>First name</span>
                    <input id="first-name" name="first_name" placeholder="Enter first name" required>
                </label>
                <label class="form-field">
                    <span>Last name</span>
                    <input id="last-name" name="last_name" placeholder="Enter last name" required>
                </label>
                <label class="form-field">
                    <span>Email</span>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </label>
                <label class="form-field">
                    <span>Job role</span>
                    <select id="job-role" name="job_role" required>
                        <option value="">Select a job role</option>
                        <option value="html">HTML Designer</option>
                        <option value="css">CSS Designer</option>
                        <option value="bootstrap">Bootstrap Developer</option>
                        <option value="javascript">JavaScript Developer</option>
                        <option value="graphics">Graphics Designer</option>
                        <option value="jquery">jQuery Developer</option>
                    </select>
                </label>
                <label class="form-field form-field-wide">
                    <span>Address</span>
                    <textarea id="address" name="address" placeholder="Enter address" rows="4" required></textarea>
                </label>
                <label class="form-field">
                    <span>City</span>
                    <input id="city" name="city" placeholder="Enter city name" required>
                </label>
                <label class="form-field">
                    <span>Pincode</span>
                    <input type="number" id="pincode" name="pincode" placeholder="Enter pincode" required>
                </label>
                <label class="form-field">
                    <span>Date of birth</span>
                    <input type="date" id="date" name="date" value="2024-03-21" required>
                </label>
                <label class="form-field">
                    <span>Upload your CV</span>
                    <input type="file" id="upload" name="upload">
                </label>
                <div class="form-actions">
                    <a class="button button-secondary" href="job.html">Back to Jobs</a>
                    <button class="button button-primary" type="submit">Submit Application</button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
